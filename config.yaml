mixed-port: 7890
allow-lan: true
bind-address: "*"
mode: rule
log-level: info
external-controller: 0.0.0.0:9090
secret: "changeme"

dns:
  enable: true
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query

listeners:
  - name: hk
    type: mixed
    port: 1081
    proxy: "香港-Reality"

  - name: jp
    type: mixed
    port: 1082
    proxy: "东京-Reality"

  - name: us
    type: mixed
    port: 1083
    proxy: "硅谷-Reality"

  - name: sg
    type: mixed
    port: 1084
    proxy: "新加坡-Reality"

  - name: us-east
    type: mixed
    port: 1085
    proxy: "弗吉尼亚-Reality"

proxy-providers:
  my-sub:
    type: file
    path: /root/.config/mihomo/proxy.yaml
    health-check:
      enable: true
      interval: 600
      url: https://www.gstatic.com/generate_204

proxy-groups:
  - name: PROXY
    type: url-test
    use:
      - my-sub
    url: https://www.gstatic.com/generate_204
    interval: 300

rules:
  - MATCH,DIRECT
