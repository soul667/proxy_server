name: Build tz

on:
  push:
    branches: [main]
    paths:
      - "tz/**"
      - "scripts/**"
      - ".github/workflows/build-tz.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build tz
        working-directory: tz
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename artifact
        run: |
          cp "tz/target/${{ matrix.target }}/release/tz" "tz-${{ matrix.target }}"

      - uses: actions/upload-artifact@v4
        with:
          name: tz-${{ matrix.target }}
          path: tz-${{ matrix.target }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f -ls

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: tz-latest
          name: tz (latest continuous)
          prerelease: true
          make_latest: false
          overwrite_files: true
          files: |
            artifacts/tz-x86_64-unknown-linux-gnu
            artifacts/tz-aarch64-unknown-linux-gnu
